name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          OUT="dist/goji-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags "-s -w -X goji/internal/version.Version=${VERSION} -X goji/internal/version.Commit=${COMMIT} -X goji/internal/version.Date=${DATE}" -o "$OUT" ./cmd/goji

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p artifacts
          FILE="goji-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp "dist/${FILE}.exe" "artifacts/${FILE}.exe"
            (cd artifacts && zip "${FILE}.zip" "${FILE}.exe")
          else
            cp "dist/${FILE}" "artifacts/${FILE}"
            tar -C artifacts -czf "artifacts/${FILE}.tar.gz" "${FILE}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
